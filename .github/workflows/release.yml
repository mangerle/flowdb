name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  WORKING_DIR: bindings/node

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            host: macos-latest
          - target: x86_64-apple-darwin
            host: macos-13
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            host: windows-latest

    runs-on: ${{ matrix.host }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            bindings/node

      - name: Install npm dependencies
        run: npm ci
        working-directory: ${{ env.WORKING_DIR }}

      - name: Build native addon
        run: npx napi build --platform --release
        working-directory: ${{ env.WORKING_DIR }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.WORKING_DIR }}/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.WORKING_DIR }}/artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Install npm dependencies
        run: npm ci
        working-directory: ${{ env.WORKING_DIR }}

      - name: Generate TypeScript declarations
        run: npx tsc
        working-directory: ${{ env.WORKING_DIR }}

      - name: Generate platform packages
        run: node scripts/publish-platforms.js
        working-directory: ${{ env.WORKING_DIR }}

      - name: Publish platform packages
        run: |
          for pkg in npm/*/; do
            echo "Publishing $pkg"
            npm publish "$pkg" --access public
          done
        working-directory: ${{ env.WORKING_DIR }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --access public
        working-directory: ${{ env.WORKING_DIR }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
