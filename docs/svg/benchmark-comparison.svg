<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="flowdb-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/><stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="rocksdb-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="flowdb-old" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bdc3c7"/><stop offset="100%" stop-color="#95a5a6"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">FlowDB vs RocksDB 性能对比</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">100K records · 128B values · batch=100 · Apple M-series</text>

  <!-- Legend -->
  <rect x="160" y="58" width="14" height="14" rx="2" fill="url(#flowdb-old)"/>
  <text x="180" y="69" font-size="11" fill="#7f8c8d">FlowDB v0.2.0</text>
  <rect x="300" y="58" width="14" height="14" rx="2" fill="url(#flowdb-bar)"/>
  <text x="320" y="69" font-size="11" fill="#27ae60">FlowDB v0.3.0</text>
  <rect x="450" y="58" width="14" height="14" rx="2" fill="url(#rocksdb-bar)"/>
  <text x="470" y="69" font-size="11" fill="#c0392b">RocksDB</text>

  <!-- Chart area: y from 80 to 380, x from 80 to 760 -->
  <!-- Y axis -->
  <line x1="80" y1="90" x2="80" y2="380" stroke="#bdc3c7" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="80" y1="380" x2="760" y2="380" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- Y axis labels (ops/s, log scale feel) -->
  <text x="74" y="94" text-anchor="end" font-size="9" fill="#95a5a6">10M</text>
  <line x1="78" y1="90" x2="760" y2="90" stroke="#ecf0f1" stroke-width="1"/>
  <text x="74" y="164" text-anchor="end" font-size="9" fill="#95a5a6">5M</text>
  <line x1="78" y1="160" x2="760" y2="160" stroke="#ecf0f1" stroke-width="1"/>
  <text x="74" y="234" text-anchor="end" font-size="9" fill="#95a5a6">2M</text>
  <line x1="78" y1="230" x2="760" y2="230" stroke="#ecf0f1" stroke-width="1"/>
  <text x="74" y="304" text-anchor="end" font-size="9" fill="#95a5a6">500K</text>
  <line x1="78" y1="300" x2="760" y2="300" stroke="#ecf0f1" stroke-width="1"/>

  <!-- Scale: 10M = y90, 0 = y380 → 1M = 29px → formula: y = 380 - val/1M * 29 -->

  <!-- ====== Sequential Write ====== -->
  <!-- v0.2.0: 2.0M → y=322, height=58 -->
  <rect x="98" y="322" width="36" height="58" rx="3" fill="url(#flowdb-old)" opacity="0.7"/>
  <text x="116" y="317" text-anchor="middle" font-size="9" fill="#7f8c8d">2.0M</text>
  <!-- v0.3.0: 4.5M → y=250, height=130 -->
  <rect x="138" y="250" width="36" height="130" rx="3" fill="url(#flowdb-bar)"/>
  <text x="156" y="245" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="700">4.5M</text>
  <!-- RocksDB: 3.1M → y=290, height=90 -->
  <rect x="178" y="290" width="36" height="90" rx="3" fill="url(#rocksdb-bar)" opacity="0.8"/>
  <text x="196" y="285" text-anchor="middle" font-size="9" fill="#c0392b">3.1M</text>
  <text x="156" y="398" text-anchor="middle" font-size="10" fill="#2c3e50">顺序写入</text>
  <text x="156" y="412" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="600">1.42x faster</text>

  <!-- ====== Concurrent Write ====== -->
  <!-- v0.2.0: 3.2M → y=287, height=93 -->
  <rect x="248" y="287" width="36" height="93" rx="3" fill="url(#flowdb-old)" opacity="0.7"/>
  <text x="266" y="282" text-anchor="middle" font-size="9" fill="#7f8c8d">3.2M</text>
  <!-- v0.3.0: 9.4M → y=107, height=273 -->
  <rect x="288" y="107" width="36" height="273" rx="3" fill="url(#flowdb-bar)"/>
  <text x="306" y="102" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="700">9.4M</text>
  <!-- RocksDB: 4.7M → y=244, height=136 -->
  <rect x="328" y="244" width="36" height="136" rx="3" fill="url(#rocksdb-bar)" opacity="0.8"/>
  <text x="346" y="239" text-anchor="middle" font-size="9" fill="#c03c3c">4.7M</text>
  <text x="306" y="398" text-anchor="middle" font-size="10" fill="#2c3e50">并发写入</text>
  <text x="306" y="412" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="600">2.02x faster</text>

  <!-- ====== Point Query ====== -->
  <!-- v0.2.0: 4.7M → y=244, height=136 -->
  <rect x="398" y="244" width="36" height="136" rx="3" fill="url(#flowdb-old)" opacity="0.7"/>
  <text x="416" y="239" text-anchor="middle" font-size="9" fill="#7f8c8d">4.7M</text>
  <!-- v0.3.0: 6.0M → y=206, height=174 -->
  <rect x="438" y="206" width="36" height="174" rx="3" fill="url(#flowdb-bar)"/>
  <text x="456" y="201" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="700">6.0M</text>
  <!-- RocksDB: 0.55M → y=364, height=16 -->
  <rect x="478" y="364" width="36" height="16" rx="3" fill="url(#rocksdb-bar)" opacity="0.8"/>
  <text x="496" y="359" text-anchor="middle" font-size="9" fill="#c03c3c">549K</text>
  <text x="456" y="398" text-anchor="middle" font-size="10" fill="#2c3e50">点查询</text>
  <text x="456" y="412" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="600">10.95x faster</text>

  <!-- ====== Prefix Scan ====== -->
  <!-- v0.3.0: 72K → very small, use 1K = 0.029px → 72K = 2px... too small for linear -->
  <!-- Use a break in axis or annotate -->
  <rect x="548" y="376" width="36" height="4" rx="2" fill="url(#flowdb-bar)"/>
  <text x="566" y="371" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="600">72K</text>
  <rect x="588" y="378" width="36" height="2" rx="1" fill="url(#rocksdb-bar)" opacity="0.8"/>
  <text x="606" y="373" text-anchor="middle" font-size="9" fill="#c03c3c">11K</text>
  <text x="566" y="398" text-anchor="middle" font-size="10" fill="#2c3e50">前缀扫描</text>
  <text x="566" y="412" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="600">6.39x faster</text>

  <!-- ====== Full Scan ====== -->
  <rect x="668" y="378" width="36" height="2" rx="1" fill="url(#flowdb-bar)"/>
  <text x="686" y="373" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="600">65</text>
  <rect x="708" y="379" width="36" height="1" rx="0.5" fill="url(#rocksdb-bar)" opacity="0.8"/>
  <text x="726" y="374" text-anchor="middle" font-size="9" fill="#c03c3c">40</text>
  <text x="686" y="398" text-anchor="middle" font-size="10" fill="#2c3e50">全表扫描</text>
  <text x="686" y="412" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="600">1.63x faster</text>

  <!-- Y axis label -->
  <text x="40" y="235" text-anchor="middle" font-size="10" fill="#7f8c8d" transform="rotate(-90, 40, 235)">ops/s (对数)</text>

  <!-- Annotation arrows for key improvements -->
  <path d="M 116,315 Q 130,280 156,240" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3498db"/>
    </marker>
  </defs>
  <rect x="100" y="140" width="80" height="36" rx="6" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
  <text x="140" y="155" text-anchor="middle" font-size="9" fill="#2980b9" font-weight="600">Vec memtable</text>
  <text x="140" y="168" text-anchor="middle" font-size="9" fill="#2980b9">+ sync API</text>

  <!-- Bottom note -->
  <text x="400" y="442" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="600">FlowDB v0.3.0 在所有 5 个类别中全面领先 RocksDB</text>
</svg>
