<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f39c12"/><stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3498db"/><stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/><stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#2c3e50">FlowDB 架构演进：v0.1.5 → v0.3.0</text>

  <!-- ====== v0.1.5 ====== -->
  <rect x="20" y="55" width="215" height="380" rx="10" fill="#fdf2f2" stroke="#e74c3c" stroke-width="2"/>
  <rect x="20" y="55" width="215" height="34" rx="10" fill="url(#g1)"/>
  <text x="127" y="77" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">v0.1.5 大而全</text>

  <rect x="35" y="100" width="185" height="26" rx="5" fill="#fadbd8" stroke="#e74c3c"/>
  <text x="127" y="117" text-anchor="middle" font-size="11" fill="#922b21">HTTP Server (axum)</text>

  <rect x="35" y="130" width="185" height="26" rx="5" fill="#fadbd8" stroke="#e74c3c"/>
  <text x="127" y="147" text-anchor="middle" font-size="11" fill="#922b21">UDP Protocol (V1/V2)</text>

  <rect x="35" y="160" width="185" height="26" rx="5" fill="#fadbd8" stroke="#e74c3c"/>
  <text x="127" y="177" text-anchor="middle" font-size="11" fill="#922b21">Admin UI + Auth</text>

  <rect x="35" y="190" width="185" height="26" rx="5" fill="#fadbd8" stroke="#e74c3c"/>
  <text x="127" y="207" text-anchor="middle" font-size="11" fill="#922b21">ServerConfig (TOML)</text>

  <line x1="35" y1="225" x2="220" y2="225" stroke="#e74c3c" stroke-dasharray="3,3" opacity="0.4"/>

  <rect x="35" y="235" width="185" height="24" rx="4" fill="#e8daef" stroke="#8e44ad"/>
  <text x="127" y="251" text-anchor="middle" font-size="11" fill="#6c3483">Engine (async API)</text>

  <rect x="35" y="265" width="85" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="77" y="280" text-anchor="middle" font-size="10" fill="#1e7e34">MemTable</text>
  <rect x="130" y="265" width="90" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="175" y="280" text-anchor="middle" font-size="10" fill="#1e7e34">WAL (SipHash)</text>

  <rect x="35" y="295" width="85" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="77" y="310" text-anchor="middle" font-size="10" fill="#1e7e34">SSTable</text>
  <rect x="130" y="295" width="90" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="175" y="310" text-anchor="middle" font-size="10" fill="#1e7e34">Compaction</text>

  <rect x="35" y="325" width="185" height="24" rx="4" fill="#fcf3cf" stroke="#f1c40f"/>
  <text x="127" y="341" text-anchor="middle" font-size="11" fill="#7d6608">BTreeMap MemTable</text>

  <rect x="35" y="360" width="185" height="26" rx="4" fill="#f5eef8" stroke="#8e44ad" stroke-dasharray="4,2"/>
  <text x="127" y="377" text-anchor="middle" font-size="11" fill="#6c3483">tokio runtime (full)</text>

  <text x="127" y="410" text-anchor="middle" font-size="10" fill="#7f8c8d">15 模块 · 4 额外依赖</text>
  <text x="127" y="425" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="600">写入比 RocksDB 慢 1.58x</text>

  <!-- arrow -->
  <polygon points="240,230 255,230 255,225 265,235 255,245 255,240 240,240" fill="#7f8c8d"/>

  <!-- ====== v0.2.1 ====== -->
  <rect x="270" y="55" width="215" height="380" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <rect x="270" y="55" width="215" height="34" rx="10" fill="url(#g2)"/>
  <text x="377" y="77" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">v0.2.1 砍 Server</text>

  <rect x="285" y="100" width="185" height="26" rx="5" fill="#fadbd8" stroke="#e74c3c" opacity="0.4" stroke-dasharray="3,3"/>
  <text x="377" y="117" text-anchor="middle" font-size="11" fill="#b03a2b" text-decoration="line-through" opacity="0.5">HTTP Server (axum)</text>

  <rect x="285" y="130" width="185" height="26" rx="5" fill="#fadbd8" stroke="#e74c3c" opacity="0.4" stroke-dasharray="3,3"/>
  <text x="377" y="147" text-anchor="middle" font-size="11" fill="#b03a2b" text-decoration="line-through" opacity="0.5">UDP Protocol (V1/V2)</text>

  <rect x="285" y="160" width="185" height="26" rx="5" fill="#fadbd8" stroke="#e74c3c" opacity="0.4" stroke-dasharray="3,3"/>
  <text x="377" y="177" text-anchor="middle" font-size="11" fill="#b03a2b" text-decoration="line-through" opacity="0.5">Admin UI + Auth</text>

  <rect x="285" y="190" width="185" height="26" rx="5" fill="#fadbd8" stroke="#e74c3c" opacity="0.4" stroke-dasharray="3,3"/>
  <text x="377" y="207" text-anchor="middle" font-size="11" fill="#b03a2b" text-decoration="line-through" opacity="0.5">ServerConfig (TOML)</text>

  <line x1="285" y1="225" x2="470" y2="225" stroke="#f39c12" stroke-dasharray="3,3" opacity="0.4"/>

  <rect x="285" y="235" width="185" height="24" rx="4" fill="#e8daef" stroke="#8e44ad"/>
  <text x="377" y="251" text-anchor="middle" font-size="11" fill="#6c3483">Engine (async API)</text>

  <rect x="285" y="265" width="85" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="327" y="280" text-anchor="middle" font-size="10" fill="#1e7e34">MemTable</text>
  <rect x="380" y="265" width="90" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="425" y="280" text-anchor="middle" font-size="10" fill="#1e7e34">WAL</text>

  <rect x="285" y="295" width="85" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="327" y="310" text-anchor="middle" font-size="10" fill="#1e7e34">SSTable</text>
  <rect x="380" y="295" width="90" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="425" y="310" text-anchor="middle" font-size="10" fill="#1e7e34">Compaction</text>

  <rect x="285" y="325" width="185" height="24" rx="4" fill="#fcf3cf" stroke="#f1c40f"/>
  <text x="377" y="341" text-anchor="middle" font-size="11" fill="#7d6608">BTreeMap MemTable</text>

  <rect x="285" y="360" width="185" height="26" rx="4" fill="#f5eef8" stroke="#8e44ad" stroke-dasharray="4,2"/>
  <text x="377" y="377" text-anchor="middle" font-size="11" fill="#6c3483">tokio runtime (full)</text>

  <text x="377" y="410" text-anchor="middle" font-size="10" fill="#7f8c8d">12 模块 · 去掉 axum/base64</text>
  <text x="377" y="425" text-anchor="middle" font-size="10" fill="#f39c12" font-weight="600">聚焦嵌入式引擎</text>

  <!-- arrow -->
  <polygon points="490,230 505,230 505,225 515,235 505,245 505,240 490,240" fill="#7f8c8d"/>

  <!-- ====== v0.3.0 ====== -->
  <rect x="520" y="55" width="215" height="380" rx="10" fill="#eafaf1" stroke="#2ecc71" stroke-width="2"/>
  <rect x="520" y="55" width="215" height="34" rx="10" fill="url(#g4)"/>
  <text x="627" y="77" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">v0.3.0 纯同步</text>

  <rect x="535" y="105" width="185" height="24" rx="4" fill="#d4efdf" stroke="#27ae60"/>
  <text x="627" y="121" text-anchor="middle" font-size="11" fill="#1e7e34">✓ 纯嵌入式引擎</text>

  <rect x="535" y="135" width="185" height="24" rx="4" fill="#d4efdf" stroke="#27ae60"/>
  <text x="627" y="151" text-anchor="middle" font-size="11" fill="#1e7e34">✓ 全同步 API (fn, 无 async)</text>

  <rect x="535" y="165" width="185" height="24" rx="4" fill="#d4efdf" stroke="#27ae60"/>
  <text x="627" y="181" text-anchor="middle" font-size="11" fill="#1e7e34">✓ MaintenanceHandle (Drop)</text>

  <line x1="535" y1="200" x2="720" y2="200" stroke="#2ecc71" stroke-dasharray="3,3" opacity="0.4"/>

  <rect x="535" y="210" width="185" height="24" rx="4" fill="#e8daef" stroke="#8e44ad"/>
  <text x="627" y="226" text-anchor="middle" font-size="11" fill="#6c3483">Engine (sync API)</text>

  <rect x="535" y="240" width="85" height="22" rx="4" fill="#abebc6" stroke="#27ae60"/>
  <text x="577" y="255" text-anchor="middle" font-size="10" fill="#145a32">Vec MemTable</text>
  <rect x="630" y="240" width="90" height="22" rx="4" fill="#abebc6" stroke="#27ae60"/>
  <text x="675" y="255" text-anchor="middle" font-size="10" fill="#145a32">WAL (FxHash)</text>

  <rect x="535" y="270" width="85" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="577" y="285" text-anchor="middle" font-size="10" fill="#1e7e34">SSTable</text>
  <rect x="630" y="270" width="90" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="675" y="285" text-anchor="middle" font-size="10" fill="#1e7e34">Compaction</text>

  <rect x="535" y="300" width="85" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="577" y="315" text-anchor="middle" font-size="10" fill="#1e7e34">Bloom</text>
  <rect x="630" y="300" width="90" height="22" rx="4" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="675" y="315" text-anchor="middle" font-size="10" fill="#1e7e34">LRU Cache</text>

  <rect x="535" y="330" width="185" height="26" rx="4" fill="#d6eaf8" stroke="#3498db"/>
  <text x="627" y="347" text-anchor="middle" font-size="11" fill="#1a5276">std::thread (无 tokio)</text>

  <text x="627" y="378" text-anchor="middle" font-size="10" fill="#7f8c8d">12 模块 · 零 async 依赖</text>
  <text x="627" y="393" text-anchor="middle" font-size="10" fill="#7f8c8d">197 测试 · 94.8% 覆盖率</text>
  <text x="627" y="413" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="700">写入快 1.42x · 点查快 10.95x</text>
  <text x="627" y="428" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="600">全面超越 RocksDB</text>

  <!-- ====== Summary timeline ====== -->
  <line x1="760" y1="80" x2="760" y2="430" stroke="#bdc3c7" stroke-width="3"/>

  <circle cx="760" cy="100" r="6" fill="#e74c3c"/>
  <text x="775" y="104" font-size="11" fill="#2c3e50" font-weight="600">v0.1.5</text>
  <text x="775" y="119" font-size="10" fill="#7f8c8d">大而全</text>
  <text x="775" y="133" font-size="10" fill="#95a5a6">HTTP+UDP+Admin</text>

  <circle cx="760" cy="170" r="6" fill="#f39c12"/>
  <text x="775" y="174" font-size="11" fill="#2c3e50" font-weight="600">v0.2.0</text>
  <text x="775" y="189" font-size="10" fill="#7f8c8d">正确性修复</text>
  <text x="775" y="203" font-size="10" fill="#95a5a6">P0-P3 硬化</text>

  <circle cx="760" cy="250" r="6" fill="#9b59b6"/>
  <text x="775" y="254" font-size="11" fill="#2c3e50" font-weight="600">v0.2.1</text>
  <text x="775" y="269" font-size="10" fill="#7f8c8d">砍掉 Server</text>
  <text x="775" y="283" font-size="10" fill="#95a5a6">纯嵌入式引擎</text>

  <circle cx="760" cy="320" r="6" fill="#3498db"/>
  <text x="775" y="324" font-size="11" fill="#2c3e50" font-weight="600">v0.2.2</text>
  <text x="775" y="339" font-size="10" fill="#7f8c8d">性能优化</text>
  <text x="775" y="353" font-size="10" fill="#95a5a6">Vec + FxHash + sync</text>

  <circle cx="760" cy="390" r="6" fill="#2ecc71"/>
  <text x="775" y="394" font-size="11" fill="#2c3e50" font-weight="600">v0.3.0</text>
  <text x="775" y="409" font-size="10" fill="#7f8c8d">去掉 async</text>
  <text x="775" y="423" font-size="10" fill="#95a5a6">零 tokio 依赖</text>
</svg>
