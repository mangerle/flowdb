[package]
name = "flowdb"
version = "0.1.4"
edition = "2024"
authors = ["jinti<shenjindi@fourz.cn>"]
repository = "https://github.com/restsend/flowdb"
description = "A time-series database for VOIP flows, written in Rust."
readme = "README.md"
keywords = ["voip", "time-series", "database", "rust"]
categories = ["databases"]
license = "MIT"

[features]
default = ["server"]
server = ["dep:axum", "dep:tower-http", "dep:base64"]

[lib]
name = "flowdb"
path = "src/lib.rs"

[[bin]]
name = "flowdb-server"
path = "src/bin/flowdb-server.rs"
required-features = ["server"]

[[bin]]
name = "flowdb-stress"
path = "src/bin/flowdb-stress.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
zstd = { version = "0.13", features = ["zstdmt"] }
parking_lot = "0.12"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
thiserror = "2"
hdrhistogram = "7"
toml = "0.8"
memmap2 = "0.9"
axum = { version = "0.8", optional = true }
tower-http = { version = "0.6", features = ["cors", "trace"], optional = true }
base64 = { version = "0.22", optional = true }
clap = { version = "4", features = ["derive"] }
tracing-subscriber = "0.3"
lru = "0.12"
ahash = "0.8"
lz4_flex = "0.11"

[dev-dependencies]
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
criterion = "0.5"
arbitrary = { version = "1", features = ["derive"] }
rocksdb = "0.23"

[[bench]]
name = "flowdb_bench"
harness = false
